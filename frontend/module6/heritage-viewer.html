<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heritage Resource Viewer</title>
    <link rel="stylesheet" href="../shared/shared.css" />
    <link rel="stylesheet" href="./module6.css" />
</head>
<body data-page="heritage-viewer">
<div class="viewer-shell">

    <header class="viewer-topbar">
        <div class="viewer-topbar-actions">
            <button id="backBtn" type="button" class="viewer-topbar-btn viewer-back-btn">
                Back
            </button>
        </div>

        <div class="viewer-topbar-right">
            <button id="feedbackBtn" type="button" class="viewer-topbar-btn viewer-account-btn">
                Feedback
            </button>
            <button id="accountBtn" type="button" class="viewer-topbar-btn viewer-account-btn">
                Account
            </button>
        </div>
    </header>

    <main class="viewer-main">

        <section class="viewer-hero">
            <div class="viewer-hero-decor viewer-hero-decor-left"></div>
            <div class="viewer-hero-decor viewer-hero-decor-right"></div>

            <div class="viewer-hero-content">
                <h1>
                    <span>Herlink:</span>
                    Explore history with us
                </h1>
                <p>Go search for the historic heritage you're interested in</p>
            </div>
        </section>

        <div class="viewer-archive-sheet">
            <section class="viewer-controls scenic-card">
                <div class="viewer-control-row">
                    <input type="text" id="keyword" placeholder="Enter keyword" />

                    <select id="type">
                        <option value="">Select type</option>
                    </select>

                    <select id="categoryId">
                        <option value="">Select category</option>
                    </select>

                    <select id="sortBy">
                        <option value="">Select sorting</option>
                        <option value="time">Sort by Time</option>
                        <option value="title">Sort by Title</option>
                    </select>

                    <button id="loadAllBtn" type="button" class="btn btn-secondary">
                        Load All
                    </button>
                    <button id="searchBtn" type="button" class="btn btn-primary">
                        Search
                    </button>
                </div>
            </section>

            <section class="viewer-section">
                <h2>Resources</h2>
                <div id="resourceList" class="viewer-resource-list"></div>
            </section>
        </div>

    </main>
</div>

<div id="toast" class="toast"></div>

<script src="../shared/shared.js"></script>
<script src="./module6.js"></script>
</body>
</html>
