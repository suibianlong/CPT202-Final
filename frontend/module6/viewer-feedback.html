<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viewer Feedback</title>
    <link rel="stylesheet" href="../shared/shared.css" />
    <link rel="stylesheet" href="./module6.css" />
</head>
<body data-page="viewer-feedback">
<div class="viewer-shell">
    <header class="viewer-detail-topbar">
        <a href="./heritage-viewer.html" class="viewer-topbar-btn viewer-topbar-link">Back to Viewer</a>
    </header>

    <main class="viewer-detail-main">
        <section class="viewer-detail-hero">
            <h1>Feedback</h1>
            <p>Share bug reports or suggestions about the viewer experience.</p>
        </section>

        <section id="detailError" class="viewer-error hidden"></section>

        <div id="detailContent" class="viewer-detail-stack">
            <section class="viewer-detail-card scenic-card">
                <div class="section-head">
                    <div>
                        <h2>Submit Feedback</h2>
                        <p>Up to 3 attachments are allowed. Supported file types: JPG, PNG, PDF, TXT.</p>
                    </div>
                </div>

                <form id="feedbackForm" class="viewer-form-stack" enctype="multipart/form-data">
                    <div class="field">
                        <label for="feedbackType">Feedback Type</label>
                        <select id="feedbackType">
                            <option value="Bug Report">Bug Report</option>
                            <option value="Suggestion">Suggestion</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="feedbackDescription">Description</label>
                        <textarea id="feedbackDescription" rows="4" placeholder="Describe the issue or suggestion in detail."></textarea>
                    </div>

                    <div class="field">
                        <label for="feedbackFiles">Attachments</label>
                        <input id="feedbackFiles" type="file" accept=".jpg,.png,.pdf,.txt" multiple />
                        <div id="feedbackFilesText" class="viewer-input-note">No files selected. JPG, PNG, PDF, or TXT. 10MB per file.</div>
                    </div>

                    <div class="viewer-form-actions">
                        <button id="feedbackSubmitBtn" type="submit" class="btn btn-secondary">Submit Feedback</button>
                    </div>
                </form>

                <div class="viewer-feedback-history">
                    <h3>My Feedback</h3>
                    <div id="feedbackList" class="viewer-feedback-list">
                        <div class="viewer-empty-message">Loading feedback history...</div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<div id="toast" class="toast"></div>

<script src="../shared/shared.js"></script>
<script src="./module6.js"></script>
</body>
</html>
