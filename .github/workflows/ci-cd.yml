name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  frontend-check:
    name: Frontend Check and Static Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend tooling dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier format check
        run: npm run format:check

      - name: Package static frontend resources
        run: |
          mkdir -p dist/frontend
          rsync -a --delete --exclude='.DS_Store' frontend/ dist/frontend/
          tar -czf dist/herlink-frontend-static.tar.gz -C dist frontend

      - name: Upload frontend static artifact
        uses: actions/upload-artifact@v4
        with:
          name: herlink-frontend-static
          path: |
            dist/frontend
            dist/herlink-frontend-static.tar.gz

  backend-test:
    name: Backend Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x backend/mvnw

      - name: Run backend automated tests
        working-directory: backend
        run: ./mvnw -B clean test

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs:
      - frontend-check
      - backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x backend/mvnw

      - name: Build backend package
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: herlink-backend-jar
          path: backend/target/*.jar

  docker-build-push:
    name: Docker Build and Private Registry Push
    runs-on: ubuntu-latest
    needs:
      - backend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image tags
        id: image
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_NAMESPACE: ${{ secrets.REGISTRY_NAMESPACE }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; }; then
            IMAGE="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/herlink-app"
            {
              echo "push=true"
              echo "app_image=${IMAGE}:sha-${GITHUB_SHA}"
              echo "tags<<EOF"
              echo "${IMAGE}:sha-${GITHUB_SHA}"
              echo "${IMAGE}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "push=false"
              echo "app_image=herlink-app:ci-${GITHUB_SHA}"
              echo "tags<<EOF"
              echo "herlink-app:ci-${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Login to private registry
        if: steps.image.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ steps.image.outputs.push == 'true' }}
          tags: ${{ steps.image.outputs.tags }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs:
      - docker-build-push

    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/herlink_deploy_key
          chmod 600 ~/.ssh/herlink_deploy_key
          ssh-keyscan -p "${{ secrets.SERVER_SSH_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy registry image with Docker Compose
        env:
          APP_IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/herlink-app:sha-${{ github.sha }}
          DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          HEALTHCHECK_URL="${DEPLOY_HEALTHCHECK_URL:-http://localhost/actuator/health}"
          REMOTE_ENV=$(printf 'APP_IMAGE=%q HEALTHCHECK_URL=%q REGISTRY_HOST=%q REGISTRY_USERNAME=%q REGISTRY_PASSWORD=%q SERVER_APP_DIR=%q' \
            "$APP_IMAGE" \
            "$HEALTHCHECK_URL" \
            "$REGISTRY_HOST" \
            "$REGISTRY_USERNAME" \
            "$REGISTRY_PASSWORD" \
            "$SERVER_APP_DIR")
          ssh -i ~/.ssh/herlink_deploy_key -p "${{ secrets.SERVER_SSH_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "$REMOTE_ENV bash -s" << 'EOF'
            set -e

            cd "${SERVER_APP_DIR}"

            printf '%s\n' "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_HOST}" \
              --username "${REGISTRY_USERNAME}" \
              --password-stdin

            export APP_IMAGE="${APP_IMAGE}"

            docker compose pull app
            docker compose up -d --no-build
            docker image prune -f

            sleep 15
            curl -fsS "${HEALTHCHECK_URL}"
          EOF
