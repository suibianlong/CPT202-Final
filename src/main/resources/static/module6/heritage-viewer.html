<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heritage Resource Viewer</title>
    <link rel="stylesheet" href="../shared/shared.css" />
    <link rel="stylesheet" href="./module6.css" />
</head>
<body data-page="heritage-viewer">
<div class="viewer-shell">
    <header class="viewer-topbar">
        <div class="viewer-topbar-actions">
            <button id="backBtn" type="button" class="viewer-topbar-btn viewer-back-btn">Back</button>
        </div>
        <button id="accountBtn" type="button" class="viewer-topbar-btn viewer-account-btn">Account</button>
    </header>

    <main class="viewer-main">
        <section class="viewer-hero">
            <p class="viewer-hero-kicker">Archive Catalogue</p>
            <h1>Heritage Resource Viewer</h1>
            <p>Browse, search and explore approved heritage resources</p>
        </section>
        <div class="viewer-archive-sheet">
            <section class="viewer-controls scenic-card">
                <div class="viewer-control-row">
                    <input type="text" id="keyword" placeholder="Enter keyword" />

                    <select id="type">
                        <option value="">Select type</option>
                        <option value="photo">Photo/Image</option>
                        <option value="video">Video</option>
                        <option value="audio">Audio</option>
                        <option value="document">File/Document</option>
                        <option value="extra link">Extra Link</option>
                        <option value="other">Other</option>
                    </select>

                    <select id="categoryId">
                        <option value="">Select category</option>
                    </select>

                    <select id="sortBy">
                        <option value="">Select sorting</option>
                        <option value="time">Sort by Time</option>
                        <option value="title">Sort by Title</option>
                    </select>

                    <button id="loadAllBtn" type="button" class="btn btn-secondary">Load All</button>
                    <button id="searchBtn" type="button" class="btn btn-primary">Search</button>
                </div>
            </section>

            <section class="viewer-section">
                <h2>Resources</h2>
                <div id="resourceList" class="viewer-resource-list"></div>
            </section>
        </div>
    </main>
</div>

<div id="toast" class="toast"></div>

<script src="../shared/shared.js"></script>
<script src="./module6.js"></script>
</body>
</html>
